<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landr — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template.css" />
  <style>
    :root {
      --color-primary:  #ECC023;
      --color-dark:     #2D2D2D;
      --color-medium:   #5A5A5A;
      --color-light-bg: #E8E8E8;
      --color-white:    #FFFFFF;
      --color-border:   #C8C8C8;
      --font-main:      'Space Grotesk', sans-serif;
      --radius-btn:     28px;
      --radius-card:    20px;
      --radius-input:   28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-light-bg);
      color: var(--color-dark);
      min-height: 100vh;
    }

    /* ── Logo top-left ── */
    .topbar {
      padding: 20px 32px;
    }

    .topbar__logo {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      gap: 2px;
    }

    .topbar__logo img {
      width: 48px;
      height: auto;
      mix-blend-mode: multiply;
    }

    .topbar__logo span {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 15px;
      color: var(--color-dark);
    }

    /* ── Tagline ── */
    .tagline {
      text-align: center;
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 42px;
      color: var(--color-dark);
      margin: 8px 0 32px;
    }

    /* ── Card ── */
    .login-card {
      background: var(--color-white);
      border-radius: 32px;
      padding: 48px 56px;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Form group ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 16px;
      color: var(--color-dark);
    }

    .form-group input {
      height: 52px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-input);
      padding: 0 20px;
      font-family: var(--font-main);
      font-size: 16px;
      color: var(--color-dark);
      background: var(--color-white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--color-primary);
    }
