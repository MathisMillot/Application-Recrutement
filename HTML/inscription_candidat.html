<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landr — Inscription candidat</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template.css" />
  <style>
    :root {
      --color-primary:  #ECC023;
      --color-dark:     #2D2D2D;
      --color-medium:   #5A5A5A;
      --color-light-bg: #E8E8E8;
      --color-white:    #FFFFFF;
      --color-border:   #C8C8C8;
      --font-main:      'Space Grotesk', sans-serif;
      --radius-btn:     28px;
      --radius-input:   28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-light-bg);
      color: var(--color-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 60px;
    }

    /* ── Logo centré en haut ── */
    .topbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-bottom: 32px;
    }

    .topbar a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .topbar img {
      width: 80px;
      height: auto;
      mix-blend-mode: multiply;
    }

    .topbar span {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 22px;
      color: var(--color-dark);
    }

    /* ── Card ── */
    .register-card {
      background: var(--color-white);
      border-radius: 32px;
      padding: 48px 56px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .register-card__title {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 28px;
      color: var(--color-dark);
      text-align: center;
      margin-bottom: 4px;
    }

    /* ── Form group ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 15px;
      color: var(--color-dark);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .form-group label .required {
      color: #e53935;
      font-size: 14px;
    }

    .form-group input {
      height: 52px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-input);
      padding: 0 20px;
      font-family: var(--font-main);
      font-size: 16px;
      color: var(--color-dark);
      background: var(--color-white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--color-primary);
    }

    /* ── Bouton Suivant ── */
    .btn-submit {
      width: 100%;
      height: 52px;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 18px;
      color: var(--color-dark);
      cursor: pointer;
      transition: opacity 0.2s;
      margin-top: 4px;
      text-decoration: none;
      text-align: center;
    }
    .btn-submit:hover { opacity: 0.88; }
  </style>
</head>
<body>

  <!-- Logo → retour accueil -->
  <div class="topbar">
    <a href="acceuil.html">
      <img src="logo_landr.png" alt="Logo Landr" />
      <span>Landr</span>
    </a>
  </div>

  <!-- Carte inscription -->
  <div class="register-card">
    <h1 class="register-card__title">Inscription candidat</h1>

    <div class="form-group">
      <label for="email">Email <span class="required">*</span></label>
      <input type="email" id="email" />
    </div>

    <div class="form-group">
      <label for="password">Mot de passe <span class="required">*</span></label>
      <input type="password" id="password" />
    </div>

    <div class="form-group">
      <label for="confirm">Confirmer mot de passe <span class="required">*</span></label>
      <input type="password" id="confirm" />
    </div>

    <a href="inscription_candidat2.html" class="btn-submit">Suivant</a>

  </div>

</body>
</html>
