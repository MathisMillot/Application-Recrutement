<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landr — Informations personnelles</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template.css" />
  <style>
    :root {
      --color-primary:  #ECC023;
      --color-dark:     #2D2D2D;
      --color-medium:   #5A5A5A;
      --color-light-bg: #E8E8E8;
      --color-white:    #FFFFFF;
      --color-border:   #C8C8C8;
      --font-main:      'Space Grotesk', sans-serif;
      --radius-btn:     28px;
      --radius-input:   28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-light-bg);
      color: var(--color-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 60px;
    }

    /* ── Logo centré ── */
    .topbar {
      margin-bottom: 28px;
    }

    .topbar a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      text-decoration: none;
    }

    .topbar img {
      width: 80px;
      height: auto;
      mix-blend-mode: multiply;
    }

    .topbar span {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 22px;
      color: var(--color-dark);
    }

    /* ── Card ── */
    .card {
      background: var(--color-white);
      border-radius: 32px;
      padding: 48px 56px;
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card__title {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 28px;
      color: var(--color-dark);
      text-align: center;
      margin-bottom: 4px;
    }

    /* ── Form ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 32px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group--full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 15px;
      color: var(--color-dark);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .required { color: #e53935; font-size: 14px; }

    .form-group input {
      height: 50px;
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-input);
      padding: 0 20px;
      font-family: var(--font-main);
      font-size: 15px;
      color: var(--color-dark);
      background: var(--color-white);
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus { border-color: var(--color-primary); }

    /* ── Actions ── */
    .form-actions {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 8px;
    }

    .btn {
      height: 52px;
      width: 180px;
      border: none;
      border-radius: var(--radius-btn);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 17px;
      color: var(--color-dark);
      background: var(--color-primary);
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn:hover { opacity: 0.88; }
  </style>
</head>
<body>

  <!-- Logo → accueil -->
  <div class="topbar">
    <a href="acceuil.html">
      <img src="logo_landr.png" alt="Logo Landr" />
      <span>Landr</span>
    </a>
  </div>

  <!-- Card -->
  <div class="card">
    <h1 class="card__title">Informations personnelles</h1>

    <div class="form-row">

      <div class="form-group">
        <label>Prénom <span class="required">*</span></label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Nom <span class="required">*</span></label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Date de Naissance <span class="required">*</span></label>
        <input type="date" />
      </div>

      <div class="form-group">
        <label>Téléphone <span class="required">*</span></label>
        <input type="tel" />
      </div>

      <div class="form-group form-group--full">
        <label>Adresse <span class="required">*</span></label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Code Postal <span class="required">*</span></label>
        <input type="text" />
      </div>

      <div class="form-group">
        <label>Ville <span class="required">*</span></label>
        <input type="text" />
      </div>

    </div>

    <div class="form-actions">
      <a href="inscription_candidat.html" class="btn">Retour</a>
      <a href="inscription_candidat3.html" class="btn">Suivant</a>
    </div>

  </div>

</body>
</html>
