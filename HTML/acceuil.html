<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landr — Trouvez votre prochain départ</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Design Tokens — repris fidèlement du screenshot (fond clair)
       ============================================================ */
    :root {
      --color-primary:   #ECC023;
      --color-dark:      #2D2D2D;
      --color-medium:    #5A5A5A;
      --color-light-bg:  #E8E8E8;
      --color-white:     #FFFFFF;
      --color-border:    #C8C8C8;
      --font-main:       'Space Grotesk', sans-serif;
      --radius-btn:      28px;
      --radius-card:     20px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      background-color: var(--color-light-bg);
      color: var(--color-dark);
      min-height: 100vh;
    }

    /* ── Navbar ───────────────────────────────────────────── */
    .navbar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 24px 48px;
    }

    .btn-login {
      background: var(--color-primary);
      color: var(--color-dark);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.3;
      text-align: center;
      padding: 25px 52px;
      min-width: 260px;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .btn-login:hover { opacity: 0.80; }

    /* ── Hero grid ────────────────────────────────────────── */
    .hero {
      display: grid;
      grid-template-columns: 340px 1fr;
      grid-template-rows: auto auto;
      column-gap: 40px;
      row-gap: 24px;
      padding: 0 48px 60px;
      align-items: start;
    }

    /* Left column */
    .hero__left {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .hero__logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .hero__logo-img {
      width: 220px;
      height: auto;
      mix-blend-mode: multiply;
    }

    .hero__brand {
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 72px;
      line-height: 1;
      color: var(--color-dark);
      margin-top: -8px;
    }

    .hero__subtitle {
      font-family: var(--font-main);
      font-weight: 400;
      font-size: 16px;
      line-height: 1.55;
      color: var(--color-medium);
      max-width: 300px;
      text-align: center;
    }

    .btn-explore {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--color-primary);
      color: var(--color-dark);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 18px;
      padding: 16px 28px;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      width: fit-content;
      transition: opacity 0.2s;
    }
    .btn-explore:hover { opacity: 0.88; }

    .btn-explore__arrow {
      width: 28px;
      height: 28px;
      background: rgba(0,0,0,0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Right column — images */
    .hero__right {
      grid-column: 2;
      grid-row: 1;
      display: flex;
      justify-content: flex-end;
    }

    .hero__img-main {
      width: 100%;
      max-width: 1000px;
      height: 340px;
      object-fit: cover;
      border-radius: var(--radius-card);
    }

    .hero__bottom-imgs {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      gap: 24px;
      justify-content: flex-end;
    }

    .hero__img-small {
      width: calc(50% - 12px);
      max-width: 1000px;
      height: 220px;
      object-fit: cover;
      border-radius: var(--radius-card);
    }

    /* ── Responsive fallback ──────────────────────────────── */
    @media (max-width: 200px) {
      .hero {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        padding: 0 24px 48px;
      }
      .hero__left  { grid-column: 1; grid-row: 1; }
      .hero__right { grid-column: 1; grid-row: 2; }
      .hero__bottom-imgs { grid-column: 1; grid-row: 3; flex-wrap: wrap; }
      .hero__img-main { max-width: 100%; }
      .hero__img-small { width: 100%; max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────── -->
  <nav class="navbar">
    <a href="connection.html" class="btn btn--primary btn-login">Login / Sign up</a>
  </nav>

  <!-- ── Hero ───────────────────────────────────────────── -->
  <main class="hero">

    <!-- Left : logo + titre + texte + CTA -->
    <div class="hero__left">
      <div class="hero__logo-wrap">
        <img
          class="hero__logo-img"
          src="logo_landr.png"
          alt="Logo Landr — fusée"
        />
        <span class="hero__brand">Landr</span>
      </div>

      <p class="hero__subtitle">
        We match the right people with the right
        opportunities, effortlessly. We redesign hiring to
        be simple, fast, and built for everyone.
      </p>

      <a href="offres.html" style="text-decoration: none;">
        <button class="btn-explore">
          Explore
          <span class="btn-explore__arrow">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 7H12M12 7L7.5 2.5M12 7L7.5 11.5" stroke="#2D2D2D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </button>
      </a>
    </div>

    <!-- Top-right : grande image (handshake) -->
    <div class="hero__right">
      <img
        class="hero__img-main"
        src="Pasted_Graphic_2.png"
        alt="Poignée de main professionnelle"
      />
    </div>

    <!-- Bottom-right : deux petites images -->
    <div class="hero__bottom-imgs">
      <img
        class="hero__img-small"
        src="Pasted_Graphic_1.png"
        alt="Entretien d'embauche"
      />
      <img
        class="hero__img-small"
        src="Pasted_Graphic.png"
        alt="Réunion professionnelle"
      />
    </div>

  </main>

</body>
</html>
